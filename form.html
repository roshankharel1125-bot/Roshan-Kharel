<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .container {
            width: 350px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        input[type="submit"] {
            background: #007BFF;
            color: white;
            border: none;
            margin-top: 15px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Registration Form</h2>

    <form>

        <!-- Name -->
        <label>Full Name</label>
        <input
            type="text"
            name="fullname"
            required
            minlength="3"
            maxlength="30"
            pattern="[A-Za-z ]+"
            title="Only letters and spaces are allowed">

        <!-- Email -->
        <label>Email</label>
        <input
            type="email"
            name="email"
            required>

        <!-- Password -->
        <label>Password</label>
        <input
            type="password"
            name="password"
            required
            minlength="8"
            pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}"
            title="Must contain at least 8 characters, one uppercase letter, one lowercase letter, and one number">

        <!-- Phone -->
        <label>Phone Number</label>
        <input
            type="tel"
            name="phone"
            required
            pattern="[0-9]{10}"
            title="Enter a 10-digit phone number">

        <!-- Age -->
        <label>Age</label>
        <input
            type="number"
            name="age"
            required
            min="18"
            max="60">

        <!-- Date of Birth -->
        <label>Date of Birth</label>
        <input
            type="date"
            name="dob"
            required>

        <!-- Gender -->
        <label>Gender</label>
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <input type="submit" value="Register">

    </form>
</div>

</body>
</html>
