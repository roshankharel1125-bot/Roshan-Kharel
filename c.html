<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #eef1f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  .card {
    width: 300px;
    height: 380px; /* fixed height so overflow shows inside, not below the card */
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .avatar-wrap {
    position: relative;
    width: 100px;
    height: 100px;
    margin-bottom: 16px;
  }

  .avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: #dfe3ea;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #9aa1ac;
    font-size: 13px;
  }

  .status-dot {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 16px;
    height: 16px;
    background: #2ecc71;
    border: 2px solid #ffffff;
    border-radius: 50%;
  }

  .name {
    margin: 0 0 4px;
    font-size: 20px;
    font-weight: 700;
    color: #1a2233;
  }

  .role {
    margin: 0 0 16px;
    font-size: 14px;
    color: #6b7280;
  }

  .bio {
    flex: 1;
    width: 100%;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.6;
    color: #374151;
    padding-right: 6px;
  }

  /* thin scrollbar so it reads clearly as "inside the box" */
  .bio::-webkit-scrollbar {
    width: 6px;
  }
  .bio::-webkit-scrollbar-thumb {
    background: #c7cdd6;
    border-radius: 3px;
  }
    </style>
  </head>
  <body>
    <header class="site-header">
      <h1>Roshan Kharel</h1>
    </header>

    <main class="content">
      <section>
        <div class="card">
          <div class="profile">
            <img src="https://via.placeholder.com/100" alt="Profile" />
            <span class="status"></span>
          </div>

          <h2>Jane Doe</h2>
          <h4>Frontend Developer</h4>

          <div class="bio">
            Property. This text is intentionally long so the bio box overflows
            and you can see the scrollbar appear inside the box instead of
            pushing the card taller.
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Hello World</p>
    </footer>
  </body>
</html>
