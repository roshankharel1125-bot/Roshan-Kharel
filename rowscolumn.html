<!DOCTYPE html>
<html>
<head>
    <title>Rowspan and Colspan Example</title>
</head>
<body>

<h2>HTML Table with Rowspan and Colspan</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>Name</th>
        <th colspan="2">Contact</th>
    </tr>

    <tr>
        <td rowspan="2">John</td>
        <td>Email</td>
        <td>john@example.com</td>
    </tr>

    <tr>
        <td>Phone</td>
        <td>9876543210</td>
    </tr>

    <tr>
        <td>Alice</td>
        <td colspan="2">alice@example.com</td>
    </tr>
</table>

</body>
</html>
