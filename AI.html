<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello World — Registration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2430;
    --parchment:#F7F5F0;
    --gold:#C9A227;
    --line:#B9B29C;
    --muted:#6B7280;
    --danger:#B3452C;
    --radius:14px;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    min-height:100vh;
    background:var(--ink);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(201,162,39,0.08), transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(201,162,39,0.06), transparent 45%);
    font-family:'Inter', sans-serif;
    color:var(--ink);
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:48px 20px;
  }

  .ticket{
    width:100%;
    max-width:620px;
    background:var(--parchment);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.5);
  }

  /* HEADER — stamped ticket band */
  header{
    background:var(--ink);
    color:var(--parchment);
    padding:34px 40px 30px;
    position:relative;
    border-bottom:2px dashed var(--gold);
  }

  header::before{
    content:"REG. № 0001";
    position:absolute;
    top:16px;
    right:40px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.12em;
    color:var(--gold);
  }

  header h1{
    margin:0;
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(32px, 6vw, 44px);
    letter-spacing:-0.01em;
  }

  header p{
    margin:8px 0 0;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--gold);
  }

  /* FORM BODY */
  form{
    padding:40px 40px 8px;
  }

  .field{
    margin-bottom:26px;
  }

  .field-label{
    display:flex;
    align-items:baseline;
    gap:8px;
    margin-bottom:8px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--muted);
  }

  .field-label .num{
    color:var(--gold);
    font-weight:600;
  }

  input[type="text"],
  input[type="tel"]{
    width:100%;
    padding:12px 14px;
    font-family:'Inter', sans-serif;
    font-size:15px;
    color:var(--ink);
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:8px;
    transition:border-color .15s ease, box-shadow .15s ease;
  }

  input[type="text"]:focus,
  input[type="tel"]:focus{
    outline:none;
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(201,162,39,0.25);
  }

  input::placeholder{ color:#B8B2A6; }

  /* Gender — segmented control */
  .segmented{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }

  .segmented input{ position:absolute; opacity:0; pointer-events:none; }

  .segmented label{
    flex:1;
    min-width:100px;
    text-align:center;
    padding:11px 14px;
    border:1.5px solid var(--line);
    border-radius:8px;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    background:#fff;
    transition:background .15s ease, border-color .15s ease, color .15s ease;
  }

  .segmented input:checked + label{
    background:var(--ink);
    border-color:var(--ink);
    color:var(--gold);
  }

  .segmented label:focus-within{
    box-shadow:0 0 0 3px rgba(201,162,39,0.25);
  }

  /* Submit */
  .submit-row{
    margin-top:8px;
    padding-bottom:36px;
  }

  button{
    width:100%;
    padding:16px;
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    font-weight:600;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink);
    background:var(--gold);
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
  }

  button:hover{ background:#DBB43A; }
  button:active{ transform:translateY(1px); }
  button:focus-visible{ outline:3px solid var(--ink); outline-offset:3px; }

  /* Perforation between form and footer */
  .perforation{
    position:relative;
    height:0;
    border-top:2px dashed var(--line);
    margin:0 40px;
  }

  .perforation::before,
  .perforation::after{
    content:"";
    position:absolute;
    top:-11px;
    width:22px;
    height:22px;
    background:var(--ink);
    border-radius:50%;
  }
  .perforation::before{ left:-51px; }
  .perforation::after{ right:-51px; }

  /* FOOTER — ticket stub */
  footer{
    padding:26px 40px 30px;
    text-align:center;
  }

  footer p{
    margin:0;
    font-family:'Fraunces', serif;
    font-weight:500;
    font-style:italic;
    font-size:20px;
    color:var(--ink);
  }

  footer span{
    display:block;
    margin-top:6px;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--muted);
  }

  @media (max-width:480px){
    header, form{ padding-left:26px; padding-right:26px; }
    .perforation{ margin:0 26px; }
    footer{ padding-left:26px; padding-right:26px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>

<div class="ticket">
  <header>
    <h1>Hello World</h1>
    <p>Registration card</p>
  </header>

  <form>
    <div class="field">
      <label class="field-label" for="fullname"><span class="num">01</span> Full name</label>
      <input type="text" id="fullname" name="fullname" placeholder="Jordan Ellis" required>
    </div>

    <div class="field">
      <label class="field-label" for="address"><span class="num">02</span> Address</label>
      <input type="text" id="address" name="address" placeholder="221B Baker Street, London" required>
    </div>

    <div class="field">
      <label class="field-label" for="phone"><span class="num">03</span> Phone number</label>
      <input type="tel" id="phone" name="phone" placeholder="+1 (555) 010-2030" required>
    </div>

    <div class="field">
      <span class="field-label"><span class="num">04</span> Gender</span>
      <div class="segmented">
        <input type="radio" id="gender-female" name="gender" value="female">
        <label for="gender-female">Female</label>

        <input type="radio" id="gender-male" name="gender" value="male">
        <label for="gender-male">Male</label>

        <input type="radio" id="gender-other" name="gender" value="other">
        <label for="gender-other">Other</label>
      </div>
    </div>

    <div class="submit-row">
      <button type="submit">Submit registration</button>
    </div>
  </form>

  <div class="perforation"></div>

  <footer>
    <p>Thank you</p>
    <span>Keep this stub for your records</span>
  </footer>
</div>

</body>
</html>
